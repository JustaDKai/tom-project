<!DOCTYPE html>
<html>
<head>
    <title>Image Upload App</title>
</head>
<body>
    <h1>Image Upload & Download App</h1>

    <h2>Upload Image</h2>

    /upload
        <input type="file" name="file" accept=".png,.jpg,.jpeg,.gif">
        <button type="submit">Upload</button>
    </form>

    <hr>

    <h2>Uploaded Files</h2>

    {% if files %}
        <ul>
        {% for file in files %}
            <li>
                {{ file }}
                -
                /download/{{ file }}Download</a>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No files uploaded yet.</p>
    {% endif %}
</body>
</html>
